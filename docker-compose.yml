version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: brandbook_db
    environment:
      POSTGRES_USER: brandbook
      POSTGRES_PASSWORD: brandbook_secret
      POSTGRES_DB: brandbook_client_os
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brandbook']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brandbook_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: brandbook_storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: brandbook
      MINIO_ROOT_PASSWORD: brandbook_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: brandbook_api
    environment:
      - DATABASE_URL=postgresql://brandbook:brandbook_secret@postgres:5432/brandbook_client_os
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - PORT=3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

volumes:
  postgres_data:
  redis_data:
  minio_data:
