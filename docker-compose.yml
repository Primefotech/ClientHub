
services:
  postgres:
    image: postgres:16-alpine
    container_name: brandbook_db
    environment:
      POSTGRES_USER: ${DB_USER:-brandbook}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-brandbook_secret}
      POSTGRES_DB: ${DB_NAME:-brandbook_client_os}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-brandbook}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: brandbook_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: brandbook_storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_USER:-brandbook}
      MINIO_ROOT_PASSWORD: ${STORAGE_PASSWORD:-brandbook_secret}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    restart: always

  init-minio:
    image: minio/mc:latest
    container_name: brandbook_init_minio
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${STORAGE_USER:-brandbook} ${STORAGE_PASSWORD:-brandbook_secret};
      /usr/bin/mc mb myminio/${STORAGE_BUCKET:-brandbook-files} --ignore-existing;
      /usr/bin/mc anonymous set public myminio/${STORAGE_BUCKET:-brandbook-files};
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: brandbook_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-brandbook}:${DB_PASSWORD:-brandbook_secret}@postgres:5432/${DB_NAME:-brandbook_client_os}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      REDIS_URL: redis://redis:6379
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_USER:-brandbook}
      STORAGE_SECRET_KEY: ${STORAGE_PASSWORD:-brandbook_secret}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-brandbook-files}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - '3001:3001'
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: brandbook_web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
    depends_on:
      - api
    ports:
      - '3000:3000'
    restart: always

volumes:
  postgres_data:
  redis_data:
  minio_data:
