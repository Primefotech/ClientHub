version: '3.8'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BrandBook Client OS — Production Docker Compose
#
#  Usage on any VPS:
#    1. cp .env.production.example .env
#    2. Edit .env with your real values (domain, secrets, etc.)
#    3. docker compose up -d --build
#    4. Seed DB on first deploy:
#       docker compose exec api npx ts-node apps/api/prisma/seed.ts
#
#  All services run on an internal bridge network.
#  Only Nginx is exposed on ports 80/443 — no cross-origin issues.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: brandbook_db
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER:-brandbook}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-brandbook_secret}
      POSTGRES_DB:       ${DB_NAME:-brandbook_client_os}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-brandbook}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: brandbook_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible file storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: brandbook_storage
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${STORAGE_ACCESS_KEY:-brandbook}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-brandbook_secret}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
    # MinIO console is only accessible internally (not exposed to internet)
    # To access it temporarily: docker compose port minio 9001

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: brandbook_api
    restart: always
    environment:
      NODE_ENV:    production
      PORT:        3001

      # Database (points to internal postgres container)
      DATABASE_URL: postgresql://${DB_USER:-brandbook}:${DB_PASSWORD:-brandbook_secret}@postgres:5432/${DB_NAME:-brandbook_client_os}

      # Auth
      JWT_SECRET:     ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # CORS — the frontend URL as seen by the browser (your public domain)
      # With Nginx same-domain routing this is rarely needed, but set anyway.
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

      # File storage (points to internal minio container)
      STORAGE_ENDPOINT:   http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-brandbook}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-brandbook_secret}
      STORAGE_BUCKET:     ${STORAGE_BUCKET:-brandbook-files}
      STORAGE_REGION:     ${STORAGE_REGION:-us-east-1}

      # Redis (points to internal redis container)
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Optional integrations (leave blank to disable)
      WHATSAPP_API_URL:        ${WHATSAPP_API_URL:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN:   ${WHATSAPP_ACCESS_TOKEN:-}
      SMTP_HOST:   ${SMTP_HOST:-}
      SMTP_PORT:   ${SMTP_PORT:-587}
      SMTP_USER:   ${SMTP_USER:-}
      SMTP_PASS:   ${SMTP_PASS:-}
      EMAIL_FROM:  ${EMAIL_FROM:-noreply@brandbook.com}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
      META_APP_SECRET:   ${META_APP_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Relative URL — works on any domain, no rebuild needed per VPS.
        # Browser calls /api/v1/... → Nginx proxies to api:3001 → zero CORS.
        NEXT_PUBLIC_API_URL: /api/v1
        # WebSocket connects to same origin through Nginx → /socket.io/
        NEXT_PUBLIC_WS_URL: ""
    container_name: brandbook_web
    restart: always
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - internal

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: brandbook_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount SSL certs when ready (e.g. via certbot / Let's Encrypt):
      # - /etc/letsencrypt/live/yourdomain.com/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      # - /etc/letsencrypt/live/yourdomain.com/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      - api
      - web
    networks:
      - internal

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge

# ── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
