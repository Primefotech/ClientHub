# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BrandBook Client OS — Nginx Reverse Proxy
#
#  HOW CORS IS ELIMINATED:
#  Browser calls yourdomain.com/api/v1/... (same origin as the frontend).
#  Nginx proxies that path internally to the API container on port 3001.
#  The browser never sees a cross-origin request → zero CORS issues.
#
#  Topology:
#    [Browser] → port 80/443 → [Nginx]
#                                  ├── /api/*        → api:3001
#                                  ├── /socket.io/*  → api:3001 (WebSocket)
#                                  └── /*            → web:3000
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Upstream services ────────────────────────────────────────────────────────
upstream api_upstream {
    server api:3001;
    keepalive 32;
}

upstream web_upstream {
    server web:3000;
    keepalive 32;
}

# ── Gzip compression ─────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    application/atom+xml image/svg+xml;

# ── HTTP → redirect to HTTPS (uncomment when SSL is configured) ──────────────
# server {
#     listen 80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;   # Uncomment for HTTPS
    server_name _;            # Replace with your domain in production

    # ── SSL (uncomment and configure when you have certs) ──────────────────
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Upload size limit (matches API 50MB limit, add headroom) ───────────
    client_max_body_size 100M;

    # ── Timeouts ───────────────────────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Common proxy headers (applied to all locations below) ──────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass                 $http_upgrade;

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #  WebSocket — Socket.IO (must come before /api/ block)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location /socket.io/ {
        proxy_pass http://api_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Keep WebSocket connection alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #  API — NestJS backend  (all /api/* routes)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "keep-alive";

        # Forward real client IP to NestJS (used in activity logs)
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #  Frontend — Next.js
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location / {
        proxy_pass http://web_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "keep-alive";
    }

    # ── Next.js HMR WebSocket (dev only, harmless in prod) ─────────────────
    location /_next/webpack-hmr {
        proxy_pass http://web_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static assets — long cache headers ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        proxy_pass http://web_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
